{{- range $component, $config := .Values.components }}
{{- if $config.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "calendar.componentName" (dict "root" $ "component" $component) }}
  labels:
    {{- include "calendar.componentLabels" (dict "root" $ "component" $component) | nindent 4 }}
spec:
  replicas: {{ $config.replicaCount }}
  selector:
    matchLabels:
      {{- include "calendar.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "calendar.componentSelectorLabels" (dict "root" $ "component" $component) | nindent 8 }}
    spec:
      containers:
        - name: {{ $component }}
          image: {{ include "calendar.componentImage" (dict "root" $ "config" $config) }}
          imagePullPolicy: {{ $.Values.image.pullPolicy }}
          env:
            - name: SERVICE
              value: {{ $config.serviceName | quote }}
            - name: CONFIG_FILE
              value: {{ $config.configFile | quote }}
          {{- if eq $component "api" }}
          ports:
            - name: http
              containerPort: {{ $config.http.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ $config.grpc.port }}
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/calendar
              readOnly: true
          {{- with $config.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "calendar.componentName" (dict "root" $ "component" $component) }}
      {{- with $config.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $config.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $config.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
{{- end }}
